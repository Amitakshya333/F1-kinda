<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2D Racing Game</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Main Menu -->
        <div id="main-menu" class="menu-screen active">
            <h1 class="game-title">F1 RACING 2D</h1>
            <div class="menu-options">
                <button class="menu-btn" id="single-player-btn">Single Player</button>
                <button class="menu-btn" id="local-multiplayer-btn">Local Multiplayer</button>
                <button class="menu-btn" id="online-multiplayer-btn">Online Multiplayer</button>
                <button class="menu-btn" id="settings-btn">Settings</button>
            </div>
        </div>

        <!-- Track Selection -->
        <div id="track-selection" class="menu-screen">
            <h2>Select Track</h2>
            <div id="track-list" class="track-grid"></div>
            <button class="back-btn">Back</button>
        </div>

        <!-- Car Selection -->
        <div id="car-selection" class="menu-screen">
            <h2>Select Team</h2>
            <div id="car-list" class="car-grid"></div>
            <button class="back-btn">Back</button>
        </div>

        <!-- Online Lobby -->
        <div id="online-lobby" class="menu-screen">
            <h2>Online Multiplayer</h2>
            <div class="lobby-options">
                <button class="menu-btn" id="create-room-btn">Create Room</button>
                <button class="menu-btn" id="join-room-btn">Join Room</button>
            </div>
            <div id="room-interface" class="hidden">
                <div id="room-info">
                    <p>Room Code: <span id="room-code"></span></p>
                    <button id="copy-code-btn">Copy Code</button>
                    <button id="share-link-btn">Share Link</button>
                </div>
                <div id="players-list"></div>
                <button id="ready-btn">Ready</button>
                <button id="start-race-btn" class="hidden">Start Race</button>
            </div>
            <div id="join-room-interface" class="hidden">
                <input type="text" id="room-code-input" placeholder="Enter Room Code" maxlength="6">
                <button id="join-btn">Join</button>
            </div>
            <button class="back-btn">Back</button>
        </div>

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div id="position" class="hud-element">1st</div>
            <div id="lap-counter" class="hud-element">Lap: 1/3</div>
            <div id="speed-meter" class="hud-element">
                <div class="speedometer">
                    <div id="speed-value">0</div>
                    <div class="speed-label">km/h</div>
                </div>
            </div>
            <div id="lap-time" class="hud-element">0:00.000</div>
            <div id="minimap" class="hud-element"></div>
            <div id="powerup-display" class="hud-element hidden">
                <span id="powerup-name"></span>
            </div>
        </div>

        <!-- Race Countdown -->
        <div id="countdown" class="hidden">
            <div id="countdown-lights">
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
            </div>
        </div>

        <!-- Pause Menu -->
        <div id="pause-menu" class="menu-screen hidden">
            <h2>Paused</h2>
            <button class="menu-btn" id="resume-btn">Resume</button>
            <button class="menu-btn" id="restart-btn">Restart</button>
            <button class="menu-btn" id="quit-btn">Quit to Menu</button>
        </div>

        <!-- Finish Screen -->
        <div id="finish-screen" class="menu-screen hidden">
            <h2>Race Complete!</h2>
            <div id="race-results"></div>
            <button class="menu-btn" id="rematch-btn">Rematch</button>
            <button class="menu-btn" id="menu-btn">Main Menu</button>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="menu-screen hidden">
            <h2>Loading...</h2>
            <div class="loading-bar">
                <div id="loading-progress"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/core/Vector2D.js"></script>
    <script src="js/core/Car.js"></script>
    <script src="js/core/Track.js"></script>
    <script src="js/core/PowerUp.js"></script>
    <script src="js/core/Camera.js"></script>
    <script src="js/core/CollisionDetector.js"></script>
    <script src="js/managers/InputManager.js"></script>
    <script src="js/managers/AudioManager.js"></script>
    <script src="js/managers/UIManager.js"></script>
    <script src="js/managers/NetworkManager.js"></script>
    <script src="js/game/GameState.js"></script>
    <script src="js/game/Game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
